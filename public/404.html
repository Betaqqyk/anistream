<!DOCTYPE html>
<html lang="th">
<head>

    <title>404 — ไม่พบหน้านี้ | 02HUB</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%2300d4ff'/><polygon points='40,30 70,50 40,70' fill='%23fff'/></svg>">
    <style>
        .error-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
        .error-content { max-width: 500px; animation: fadeUp 0.8s ease; }
        .error-code { font-size: 120px; font-weight: 900; background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; margin-bottom: 0.5rem; }
        .error-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 1rem; }
        .error-desc { color: var(--text-muted); margin-bottom: 2rem; line-height: 1.6; }
        .error-illustration { width: 200px; height: 200px; margin: 0 auto 2rem; background: linear-gradient(135deg, rgba(0,212,255,0.1), rgba(168,85,247,0.1)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 80px; border: 2px dashed var(--border-color); animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="container">
            <a href="/" class="nav-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="url(#grad)" stroke-width="2.5"><defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%"><stop offset="0%" style="stop-color:#00d4ff"/><stop offset="100%" style="stop-color:#0ea5e9"/></linearGradient></defs><polygon points="5 3 19 12 5 21 5 3"/></svg>

    <div class="error-page">

            <div class="error-illustration">
                <svg viewBox="0 0 24 24" width="120" height="120" fill="none" stroke="var(--accent-purple)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="7" width="20" height="15" rx="2" ry="2"></rect>
                    <polyline points="17 2 12 7 7 2"></polyline>
                    <line x1="12" y1="12" x2="12" y2="16"></line>

            <a href="/" class="btn btn-primary"><svg class="icon-sm" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:-3px;margin-right:4px;"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg> กลับหน้าแรก</a>
